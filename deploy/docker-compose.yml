services:
  dayz:
    image: ghcr.io/noscopestudios/crayz-server:latest
    container_name: crayz-dayz
    env_file:
      - path: .env
        required: false
    environment:
      DAYZ_SERVER_NAME: "${DAYZ_SERVER_NAME:-CrayZ Test Server}"
      DAYZ_SERVER_PORT: "${DAYZ_SERVER_PORT:-2302}"
      DAYZ_SERVER_CONFIG: "${DAYZ_SERVER_CONFIG:-serverDZ.cfg}"
      DAYZ_STEAM_APP_ID: "${DAYZ_STEAM_APP_ID:-223350}"
      DAYZ_VALIDATE_INSTALL: "${DAYZ_VALIDATE_INSTALL:-1}"
      DAYZ_AUTO_UPDATE: "${DAYZ_AUTO_UPDATE:-1}"
      DAYZ_EXTRA_ARGS: "${DAYZ_EXTRA_ARGS:-}"
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      # Credentialed SteamCMD login is required; anonymous login is unsupported.
      # Keep real Steam credentials only in local .env and never commit them.
      DAYZ_ALLOW_STEAM_CREDENTIAL_LOGIN: "${DAYZ_ALLOW_STEAM_CREDENTIAL_LOGIN:-0}"
    ports:
      - "${DAYZ_SERVER_PORT:-2302}:${DAYZ_SERVER_PORT:-2302}/udp"
      - "${DAYZ_STEAM_QUERY_PORT:-27016}:27016/udp"
    volumes:
      - ./data/server:/dayz/server
      - ./data/profiles:/dayz/profiles
      - ./data/logs:/dayz/logs
      - ./data/steam/dot-steam:/home/dayz/.steam
      - ./data/steam/Steam:/home/dayz/Steam
      - ./config:/dayz/config
    stdin_open: true
    tty: true
    restart: unless-stopped
